version: "3.9"

services:
  backend:
    build:
      context: ./automated-learning-system/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./emotion_learning.db}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - RL_MODEL_PATH=${RL_MODEL_PATH:-./models/ppo_model.zip}
      - FACIAL_MODEL_PATH=${FACIAL_MODEL_PATH:-./models/facial_emotion.pth}
      - DEBUG=${DEBUG:-false}
    volumes:
      - backend_data:/app/data
      - ./automated-learning-system/backend/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm start"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000/ws/emotion
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./automated-learning-system/frontend/client:/app
    depends_on:
      - backend

volumes:
  backend_data:
